version: '3.8'

# Single-server deployment — all services on one EC2 t3.medium (~$30/month)
# Nginx acts as the API gateway (same routing as the former K8s api-gateway).
# One PostgreSQL instance hosts all service databases (created by postgres-init/).
# Update API_GATEWAY_URL in Vercel to http://<EC2_PUBLIC_IP> to reconnect frontend.

x-django-common: &django-common
  restart: unless-stopped
  networks: [lawbridge]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  env_file: .env

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [lawbridge]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: lawbridge_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawbridge_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [lawbridge]
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [lawbridge]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [lawbridge]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - case-service
      - lawyer-service
      - library-service
      - outreach-service
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Django Microservices ──────────────────────────────────────────────────────

  auth-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/auth-service:latest
    expose: ["8001"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: auth_db
      REDIS_URL: redis://redis:6379/0

  client-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/client-service:latest
    expose: ["8002"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: client_db
      REDIS_URL: redis://redis:6379/0

  lawyer-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/lawyer-service:latest
    expose: ["8003"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: lawyer_db
      REDIS_URL: redis://redis:6379/0

  case-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/case-service:latest
    expose: ["8004"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: case_db
      REDIS_URL: redis://redis:6379/0
      LAWYER_SERVICE_URL: http://lawyer-service:8003

  document-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/document-service:latest
    expose: ["8005"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: document_db
      REDIS_URL: redis://redis:6379/0
      CASE_SERVICE_URL: http://case-service:8004/api/v1/cases
      NOTIFICATION_SERVICE_URL: http://notification-service:8006

  notification-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/notification-service:latest
    expose: ["8006"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: notification_db
      REDIS_URL: redis://redis:6379/0

  payment-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/payment-service:latest
    expose: ["8007"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: payment_db
      REDIS_URL: redis://redis:6379/0

  calendar-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/calendar-service:latest
    expose: ["8008"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: calendar_db
      REDIS_URL: redis://redis:6379/0
      MONITORING_SERVICE_URL: http://monitoring-service:8009

  monitoring-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/monitoring-service:latest
    expose: ["8009"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: monitoring_db
      REDIS_URL: redis://redis:6379/0
      LAWYER_SERVICE_URL: http://lawyer-service:8003
      AI_SERVICE_URL: http://ai-assistant-service:8011
      AUTH_SERVICE_URL: http://auth-service:8001
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@lawbridge.cm}

  monitoring-consumer:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/monitoring-service:latest
    command: python manage.py consume_case_events
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: monitoring_db
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8001
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@lawbridge.cm}

  search-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/search-service:latest
    expose: ["8010"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: search_db
      REDIS_URL: redis://redis:6379/0

  ai-assistant-service:
    <<: *django-common
    image: ${AI_SERVICE_IMAGE:-820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/ai-assistant-service:latest}
    expose: ["8011"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ai_db
      DB_USER: lawbridge_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CASE_SERVICE_URL: http://case-service:8004
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.3-70b-versatile

  messaging-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/messaging-service:latest
    expose: ["8012"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: messaging_db
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-assistant-service:8011

  library-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/library-service:latest
    expose: ["8013"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: library_db
      REDIS_URL: redis://redis:6379/0

  outreach-service:
    <<: *django-common
    image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/outreach-service:latest
    expose: ["8014"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: outreach_db

networks:
  lawbridge:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
