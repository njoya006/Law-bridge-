# One StatefulSet + headless Service per microservice database.
# Each database is isolated: no cross-service direct DB access.

# ─── AUTH DATABASE ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: lawbridge
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels: { app: auth-db }
  template:
    metadata:
      labels: { app: auth-db }
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: AUTH_DB }
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: DB_USER }
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: DB_PASSWORD }
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "lawbridge_user"]
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: lawbridge
spec:
  clusterIP: None
  selector: { app: auth-db }
  ports:
  - port: 5432
    targetPort: 5432
---
