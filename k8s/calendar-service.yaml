apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-service
  namespace: lawbridge
spec:
  replicas: 2
  selector:
    matchLabels: { app: calendar-service }
  template:
    metadata:
      labels: { app: calendar-service }
    spec:
      containers:
      - name: calendar-service
        image: lawbridge/calendar-service:latest
        ports:
        - containerPort: 8008
        # Run migrations then launch gunicorn (mirrors docker-compose command)
        command: ["sh", "-c", "python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8008 --workers 2"]
        env:
        - name: DB_HOST
          value: calendar-db.lawbridge.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: CALENDAR_DB }
        - name: DB_USER
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: DB_USER }
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: DB_PASSWORD }
        envFrom:
        - secretRef:
            name: lawbridge-secrets
        readinessProbe:
          httpGet:
            path: /
            port: 8008
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: calendar-service
  namespace: lawbridge
spec:
  selector: { app: calendar-service }
  ports:
  - port: 80
    targetPort: 8008
