apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-assistant-service
  namespace: lawbridge
spec:
  replicas: 1
  selector:
    matchLabels: { app: ai-assistant-service }
  template:
    metadata:
      labels: { app: ai-assistant-service }
    spec:
      containers:
      - name: ai-assistant-service
        image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/ai-assistant-service:latest
        ports:
        - containerPort: 8011
        env:
        - name: DB_HOST
          value: lawbridge-postgres.cvn0ogw1uqg0.us-east-1.rds.amazonaws.com
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: lawbridge_ai_assistant
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: LawBridgePass2024
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef: { name: groq-secret, key: GROQ_API_KEY }
        envFrom:
        - secretRef:
            name: lawbridge-secrets
        readinessProbe:
          httpGet:
            path: /api/v1/health/live/
            port: 8011
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/health/live/
            port: 8011
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        resources:
          requests: { cpu: 200m, memory: 256Mi }
          limits: { cpu: 1000m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: ai-assistant-service
  namespace: lawbridge
spec:
  selector: { app: ai-assistant-service }
  ports:
  - port: 80
    targetPort: 8011
---
# Celery worker for AI async task processing (LLM inference jobs)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-assistant-celery
  namespace: lawbridge
spec:
  replicas: 1
  selector:
    matchLabels: { app: ai-assistant-celery }
  template:
    metadata:
      labels: { app: ai-assistant-celery }
    spec:
      containers:
      - name: celery-worker
        image: 820561684310.dkr.ecr.us-east-1.amazonaws.com/lawbridge/ai-assistant-service:latest
        command: ["celery", "-A", "core", "worker", "--loglevel=info", "--concurrency=1"]
        env:
        - name: DB_HOST
          value: lawbridge-postgres.cvn0ogw1uqg0.us-east-1.rds.amazonaws.com
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: lawbridge_ai_assistant
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: LawBridgePass2024
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef: { name: groq-secret, key: GROQ_API_KEY }
        envFrom:
        - secretRef:
            name: lawbridge-secrets
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits: { cpu: 2000m, memory: 2Gi }
