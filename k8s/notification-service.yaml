apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: lawbridge
spec:
  replicas: 2
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
    spec:
      containers:
      - name: notification-service
        image: ghcr.io/njoya006/lawbridge-notification-service:latest
        ports:
        - containerPort: 8006
        env:
        - name: DB_HOST
          value: notification-db.lawbridge.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: NOTIFICATION_DB }
        - name: DB_USER
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: DB_USER }
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: { name: lawbridge-db-secrets, key: DB_PASSWORD }
        envFrom:
        - secretRef:
            name: lawbridge-secrets
        readinessProbe:
          httpGet:
            path: /
            port: 8006
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8006
          initialDelaySeconds: 20
          periodSeconds: 20
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: lawbridge
spec:
  selector: { app: notification-service }
  ports:
  - port: 80
    targetPort: 8006
