apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: lawbridge
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'

    receivers:
    - name: 'default'
      # Configure with real alert targets (email/Slack/PagerDuty) before production
      webhook_configs: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: lawbridge
spec:
  replicas: 1
  selector:
    matchLabels: { app: alertmanager }
  template:
    metadata:
      labels: { app: alertmanager }
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        ports:
        - containerPort: 9093
        args:
        - "--config.file=/etc/alertmanager/alertmanager.yml"
        - "--storage.path=/alertmanager"
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager/alertmanager.yml
          subPath: alertmanager.yml
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 200m, memory: 128Mi }
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: lawbridge
spec:
  selector: { app: alertmanager }
  ports:
  - port: 9093
    targetPort: 9093
