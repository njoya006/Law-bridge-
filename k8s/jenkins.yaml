---
apiVersion: v1
kind: Namespace
metadata:
  name: jenkins
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: jenkins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels: { app: jenkins }
  template:
    metadata:
      labels: { app: jenkins }
    spec:
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 0
        runAsUser: 0
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts-jdk21
        ports:
        - containerPort: 8080
          name: web
        - containerPort: 50000
          name: agent
        env:
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=false"
        - name: JENKINS_ADMIN_ID
          value: admin
        - name: JENKINS_ADMIN_PASSWORD
          value: LawBridge2024!
        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home
        - name: init-scripts
          mountPath: /var/jenkins_home/init.groovy.d
        resources:
          requests: { cpu: 500m, memory: 512Mi }
          limits: { cpu: 2000m, memory: 2Gi }
        readinessProbe:
          httpGet: { path: /login, port: 8080 }
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 10
        livenessProbe:
          httpGet: { path: /login, port: 8080 }
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
      volumes:
      - name: jenkins-home
        hostPath:
          path: /var/jenkins_home
          type: DirectoryOrCreate
      - name: init-scripts
        configMap:
          name: jenkins-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-lb
  namespace: jenkins
spec:
  type: LoadBalancer
  selector: { app: jenkins }
  ports:
  - name: web
    port: 80
    targetPort: 8080
  - name: agent
    port: 50000
    targetPort: 50000
