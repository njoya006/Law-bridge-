name: Debug — bookings endpoint diagnostic

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Targeted diagnostic
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":[
              "echo === CONTAINERS ===",
              "docker ps --format \"{{.Names}}\" 2>&1",
              "echo === VIEWS LINE 370 IN CONTAINER ===",
              "docker exec lawbridge-case-service-1 sed -n '\''368,372p'\'' /app/apps/cases/views.py 2>&1 || docker exec case-service sed -n '\''368,372p'\'' /app/apps/cases/views.py 2>&1 || echo BOTH_FAILED",
              "echo === CASE COUNT ===",
              "docker exec lawbridge-postgres-1 psql -U lawbridge_user -d case_db -c \"SELECT COUNT(*) FROM cases_case;\" 2>&1 || docker exec postgres psql -U lawbridge_user -d case_db -c \"SELECT COUNT(*) FROM cases_case;\" 2>&1 || echo DB_FAIL"
            ]}' \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 20
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent, StandardErrorContent]' \
            --output text
