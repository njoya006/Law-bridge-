name: Debug — bookings endpoint diagnostic

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check views.py patch and DB state
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":[
              "echo === VIEWS.PY LINE 370 AREA ===",
              "docker exec case-service grep -n -A2 -B2 assigned_lawyer_id /app/apps/cases/views.py | grep -A4 any.booking",
              "echo === CASES IN DB ===",
              "docker exec postgres psql -U lawbridge_user -d case_db -c \"SELECT id, assigned_lawyer_id, booking_status, booking_metadata->>target_id AS target_id FROM cases_case LIMIT 15;\"",
              "echo === AUTH UUIDs FOR NJI LAWYERS ===",
              "docker exec postgres psql -U lawbridge_user -d auth_db -c \"SELECT id, email FROM users_user WHERE email LIKE %nji-associates%;\""
            ]}' \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 25
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query StandardOutputContent --output text
