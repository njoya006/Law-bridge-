name: Debug — bookings endpoint diagnostic

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: DB lookup - who booked and firm memberships
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands='["docker exec lawbridge-postgres-1 psql -U lawbridge_user -d auth_db -c \"SELECT id,email,role FROM users_user WHERE id='"'"'4ffe5f0d-4d67-41ab-80f5-38150576741c'"'"';\" 2>&1 && docker exec lawbridge-postgres-1 psql -U lawbridge_user -d lawyer_db -c \"SELECT f.id,f.name,fm.role,fm.is_active FROM firms_firm f JOIN firms_firmmembership fm ON f.id=fm.firm_id JOIN auth_user u ON u.id=fm.user_id WHERE u.username='"'"'emmanuel.nji@nji-associates.cm'"'"';\" 2>&1"]' \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 15
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text

      - name: Live login and incoming-bookings test
        run: |
          SCRIPT='
          TOKEN=$(curl -s -X POST http://localhost/api/v1/auth/login/ \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"emmanuel.nji@nji-associates.cm\",\"password\":\"LawBridge@2024\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get(\"access\",\"\"))")
          echo "TOKEN_LENGTH=${#TOKEN}"
          curl -s "http://localhost/api/v1/cases/incoming-bookings/" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(\"COUNT:\",d.get(\"count\")); [print(\"  -\",r.get(\"title\"),\"|\",r.get(\"booking_status\"),\"| target:\",r.get(\"booking_metadata\",{}).get(\"target_name\")) for r in d.get(\"results\",[])]"
          '
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 20
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
