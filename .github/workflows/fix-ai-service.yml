name: Fix AI Service — Set Groq Key & Restart

on:
  workflow_dispatch:
    inputs:
      groq_api_key:
        description: 'Groq API key (gsk_...). Leave blank to use key already in SSM.'
        required: false
        default: ''

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 1: If a key was provided, update SSM so EC2 can read it
      - name: Update SSM with Groq key (if provided)
        if: ${{ github.event.inputs.groq_api_key != '' }}
        run: |
          aws ssm put-parameter \
            --name "/lawbridge/GROQ_API_KEY" \
            --value "${{ github.event.inputs.groq_api_key }}" \
            --type SecureString \
            --overwrite \
            --region us-east-1
          echo "SSM /lawbridge/GROQ_API_KEY updated."

      # Step 2: Verify SSM has a non-empty key before proceeding
      - name: Verify Groq key exists in SSM
        run: |
          KEY=$(aws ssm get-parameter \
            --name "/lawbridge/GROQ_API_KEY" --with-decryption \
            --query 'Parameter.Value' --output text --region us-east-1 2>/dev/null || echo "")
          if [ -z "$KEY" ]; then
            echo "ERROR: /lawbridge/GROQ_API_KEY is empty in SSM."
            echo "Run this workflow again and paste your Groq key in the input field."
            echo "Get a free key at: https://console.groq.com"
            exit 1
          fi
          echo "Key found in SSM (prefix: ${KEY:0:8}...)"

      # Step 3: On EC2 — read key from SSM, update .env, restart container, migrate
      - name: Fix AI service on EC2 via SSM
        run: |
          INSTANCE_ID="i-031445edd3e88f5fe"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /opt/lawbridge && git pull origin main && GROQ_KEY=$(aws ssm get-parameter --name /lawbridge/GROQ_API_KEY --with-decryption --query Parameter.Value --output text --region us-east-1) && if grep -q GROQ_API_KEY .env; then sed -i \"s|^GROQ_API_KEY=.*|GROQ_API_KEY=${GROQ_KEY}|\" .env; else echo \"GROQ_API_KEY=${GROQ_KEY}\" >> .env; fi && echo KEY_WRITTEN && aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 820561684310.dkr.ecr.us-east-1.amazonaws.com 2>/dev/null && docker compose up -d --no-deps --pull always ai-assistant-service && echo CONTAINER_RESTARTED && sleep 25 && docker compose exec -T ai-assistant-service python manage.py migrate --no-input && echo MIGRATIONS_DONE"]}' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command: $CMD_ID"
          echo "Waiting 120s for restart + migrations..."
          sleep 120

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json

      # Step 4: Confirm container is healthy
      - name: Verify AI service is running
        run: |
          INSTANCE_ID="i-031445edd3e88f5fe"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /opt/lawbridge && docker compose ps ai-assistant-service && curl -s -o /dev/null -w HTTP_%{http_code} http://localhost/api/v1/ai/sessions/ -H \"Authorization: Bearer test\""]}' \
            --query 'Command.CommandId' --output text)

          sleep 15

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json
