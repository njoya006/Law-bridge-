name: Hotpatch — firm gallery feature

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Pull latest code and inject firm gallery files
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":[
              "cd /opt/lawbridge && git pull origin main",
              "docker cp /opt/lawbridge/services/lawyer-service/apps/firms/models.py lawbridge-lawyer-service-1:/app/apps/firms/models.py",
              "docker cp /opt/lawbridge/services/lawyer-service/apps/firms/serializers.py lawbridge-lawyer-service-1:/app/apps/firms/serializers.py",
              "docker cp /opt/lawbridge/services/lawyer-service/apps/firms/views.py lawbridge-lawyer-service-1:/app/apps/firms/views.py",
              "docker cp /opt/lawbridge/services/lawyer-service/apps/firms/urls.py lawbridge-lawyer-service-1:/app/apps/firms/urls.py",
              "docker cp /opt/lawbridge/services/lawyer-service/apps/firms/migrations/0006_firmgalleryimage.py lawbridge-lawyer-service-1:/app/apps/firms/migrations/0006_firmgalleryimage.py",
              "docker exec lawbridge-lawyer-service-1 python manage.py migrate --noinput",
              "docker restart lawbridge-lawyer-service-1",
              "sleep 8 && docker exec lawbridge-lawyer-service-1 python manage.py showmigrations firms | tail -5"
            ]}' \
            --query Command.CommandId --output text)

          echo "Command ID: $CMD_ID"
          sleep 40

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
