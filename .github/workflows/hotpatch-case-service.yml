name: Hotpatch — case-service views.py on EC2

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Git pull patch all three files restart and verify
        run: |
          SCRIPT='cd /opt/lawbridge && git pull origin main && docker cp /opt/lawbridge/services/case-service/apps/cases/views.py lawbridge-case-service-1:/app/apps/cases/views.py && docker cp /opt/lawbridge/services/case-service/core/settings.py lawbridge-case-service-1:/app/core/settings.py && docker cp /opt/lawbridge/services/lawyer-service/apps/firms/views.py lawbridge-lawyer-service-1:/app/apps/firms/views.py && docker restart lawbridge-case-service-1 && docker restart lawbridge-lawyer-service-1 && sleep 15 && echo "=url=" && docker exec lawbridge-case-service-1 python3 -c "import os; os.environ[\"DJANGO_SETTINGS_MODULE\"]=\"core.settings\"; import django; django.setup(); from django.conf import settings; print(\"URL:\",settings.LAWYER_SERVICE_URL)" && echo "=firmids=" && docker exec lawbridge-case-service-1 python3 -c "import os; os.environ[\"DJANGO_SETTINGS_MODULE\"]=\"core.settings\"; import django; django.setup(); from apps.cases.views import get_user_firm_ids_from_lawyer_service; print(\"FIRM_IDS:\",get_user_firm_ids_from_lawyer_service(\"240bbc06-751e-467e-b110-ea46d0ea2b60\",internal=True))" && echo PATCH_DONE'
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 55
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text

      - name: Incoming bookings final test
        run: |
          SCRIPT='TOKEN=$(curl -s -X POST http://localhost/api/v1/auth/login/ -H "Content-Type: application/json" -d '"'"'{"email":"emmanuel.nji@nji-associates.cm","password":"LawBridge@2024"}'"'"' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get(\"access\",\"ERR\"))") && curl -s "http://localhost/api/v1/cases/incoming-bookings/" -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(\"COUNT:\",d.get(\"count\")); [print(\" -\",r.get(\"title\"),\"|\",r.get(\"booking_status\"),\"|\",( r.get(\"booking_metadata\") or {}).get(\"target_name\")) for r in d.get(\"results\",[])]"'
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 25
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
