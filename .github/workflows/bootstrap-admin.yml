name: Bootstrap Admin Account

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check running containers (diagnostic)
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":["docker ps --format \"{{.Names}} | {{.Status}}\""]}' \
            --query Command.CommandId --output text)
          echo "Diagnostic cmd: $CMD_ID"
          sleep 15
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text

      - name: Create admin account
        run: |
          # Python script is pre-encoded to avoid ALL quoting issues.
          # Decodes to:
          #   import os, django
          #   os.environ['DJANGO_SETTINGS_MODULE'] = 'core.settings'
          #   django.setup()
          #   from apps.users.models import User
          #   email = 'admin@lawbridge.cm'
          #   password = 'LBAdmin@2026!'
          #   u, c = User.objects.get_or_create(email=email, defaults={'full_name': 'LawBridge Admin', 'role': 'admin'})
          #   if c: u.set_password(password); u.is_active = True; u.save(); print('CREATED:', email)
          #   else: u.role='admin'; u.is_active=True; u.set_password(password); u.save(); print('UPDATED:', email)
          #   print('role=', u.role, '| active=', u.is_active)
          PY_B64=""

          # Build shell script: decode Python → write to file → copy into container → run
          INNER="echo ${PY_B64} | base64 -d > /tmp/mk_admin.py && docker cp /tmp/mk_admin.py lawbridge-auth-service-1:/tmp/mk_admin.py && docker exec lawbridge-auth-service-1 python3 /tmp/mk_admin.py"
          ENCODED=$(echo "$INNER" | base64 -w 0)

          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "Admin cmd: $CMD_ID"
          sleep 30
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
