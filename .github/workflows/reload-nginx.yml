name: Reload nginx — apply updated nginx.conf

on:
  workflow_dispatch:

jobs:
  reload:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Pull and reload nginx
        run: |
          SCRIPT='cd /opt/lawbridge && git pull origin main && docker cp nginx/nginx.conf lawbridge-nginx-1:/etc/nginx/nginx.conf && docker exec lawbridge-nginx-1 nginx -t && docker exec lawbridge-nginx-1 nginx -s reload && echo NGINX_RELOADED'
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 25
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
