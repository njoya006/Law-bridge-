name: Check EC2 Init Log

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Check EC2 via SSM Run Command
        run: |
          INSTANCE_ID="i-031445edd3e88f5fe"
          echo "=== Checking EC2 instance state ==="
          aws ec2 describe-instance-status \
            --instance-ids "$INSTANCE_ID" \
            --query 'InstanceStatuses[0].{State:InstanceState.Name,System:SystemStatus.Status,Instance:InstanceStatus.Status}' \
            --output table

          echo ""
          echo "=== Sending SSM command to read init log ==="
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cat /var/log/lawbridge-init.log 2>/dev/null || echo LOG_NOT_FOUND","echo ---","docker ps 2>/dev/null || echo DOCKER_NOT_READY","echo ---","df -h /"]}' \
            --query 'Command.CommandId' --output text)

          echo "Command ID: $CMD_ID"
          sleep 15

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json || echo "SSM not ready yet (instance may still be starting)"
