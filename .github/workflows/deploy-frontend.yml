name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lawbridge-frontend/**'

env:
  VERCEL_ORG_ID: team_dmtId0wYPJsNmwfBNmetJQBG
  VERCEL_PROJECT_ID: prj_mQQgFxhBGPxnrgDhaRUF0pHqTHks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lawbridge-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Strip BOM from token
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
        run: python3 -c "import os; t=os.environ['VERCEL_TOKEN_RAW'].encode('utf-8').decode('utf-8-sig').strip(); open('/tmp/vt','w').write(t)"

      - name: Deploy to Vercel (production)
        working-directory: lawbridge-frontend
        run: vercel --prod --token "$(cat /tmp/vt)" --yes
