name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'lawbridge-frontend/**'

env:
  VERCEL_ORG_ID: team_dmtId0wYPJsNmwfBNmetJQBG
  VERCEL_PROJECT_ID: prj_mQQgFxhBGPxnrgDhaRUF0pHqTHks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lawbridge-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: lawbridge-frontend
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Strip BOM and whitespace that Windows editors sometimes add to secrets
          VERCEL_TOKEN=$(printf '%s' "$VERCEL_TOKEN_RAW" | tr -d '﻿\r' | xargs)
          vercel --prod --token "$VERCEL_TOKEN" --yes
