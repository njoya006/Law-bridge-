name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lawbridge-frontend/**'

env:
  VERCEL_ORG_ID: team_dmtId0wYPJsNmwfBNmetJQBG
  VERCEL_PROJECT_ID: prj_mQQgFxhBGPxnrgDhaRUF0pHqTHks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lawbridge-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Clean token
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys
          raw = os.environ['VERCEL_TOKEN_RAW']
          clean = raw.encode('utf-8').decode('utf-8-sig')
          clean = re.sub(r'[^\x21-\x7e]', '', clean)
          print("Cleaned token length:", len(clean))
          print("First 4 chars:", repr(clean[:4]))
          if len(clean) < 10:
              print("ERROR: token too short or empty")
              sys.exit(1)
          open('/tmp/vt', 'w').write(clean)
          PYEOF

      - name: Deploy to Vercel (production)
        run: |
          export VERCEL_TOKEN=$(cat /tmp/vt)
          vercel --prod --yes
