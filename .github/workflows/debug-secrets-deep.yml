name: Debug Secrets Deep

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config

      - name: Inspect lawbridge-secrets keys
        run: |
          echo "=== All keys in lawbridge-secrets ==="
          kubectl get secret lawbridge-secrets -n lawbridge -o json | \
            python3 -c "import json,sys; s=json.load(sys.stdin); print('\n'.join(s['data'].keys()))"
          echo ""
          echo "=== JWT_SECRET_KEY value prefix ==="
          kubectl get secret lawbridge-secrets -n lawbridge -o jsonpath='{.data.JWT_SECRET_KEY}' | base64 -d | cut -c1-16

      - name: Check live deployment specs
        run: |
          echo "=== auth-service deployment env section ==="
          kubectl get deployment auth-service -n lawbridge -o json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); envs=d['spec']['template']['spec']['containers'][0].get('env',[]); efrom=d['spec']['template']['spec']['containers'][0].get('envFrom',[]); print('env:'); [print(' ',e) for e in envs]; print('envFrom:'); [print(' ',e) for e in efrom]"

      - name: Check env vars inside pods
        run: |
          for svc in auth-service case-service ai-assistant-service; do
            POD=$(kubectl get pod -n lawbridge -l app=$svc --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$POD" ]; then
              echo "=== $svc ($POD) - JWT-related env vars ==="
              kubectl exec -n lawbridge "$POD" -- env 2>/dev/null | grep -i jwt || echo "  (none found)"
              echo "=== $svc ($POD) - envFrom keys count ==="
              kubectl exec -n lawbridge "$POD" -- env 2>/dev/null | wc -l
            fi
          done

      - name: Direct kubectl set env fix
        run: |
          ACTUAL_KEY=$(kubectl get secret lawbridge-secrets -n lawbridge -o jsonpath='{.data.JWT_SECRET_KEY}' | base64 -d)
          echo "Setting JWT_SECRET_KEY directly in deployment spec (first 12 chars: ${ACTUAL_KEY:0:12})"
          kubectl set env deployment/auth-service -n lawbridge JWT_SECRET_KEY="$ACTUAL_KEY"
          kubectl set env deployment/case-service -n lawbridge JWT_SECRET_KEY="$ACTUAL_KEY"
          echo "Waiting for rollouts..."
          kubectl rollout status deployment/auth-service -n lawbridge --timeout=120s
          kubectl rollout status deployment/case-service -n lawbridge --timeout=120s

      - name: Verify after direct set
        run: |
          sleep 5
          for svc in auth-service case-service; do
            POD=$(kubectl get pod -n lawbridge -l app=$svc --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$POD" ]; then
              KEY=$(kubectl exec -n lawbridge "$POD" -- python3 -c "import os; print(os.environ.get('JWT_SECRET_KEY','MISSING')[:12])" 2>/dev/null)
              echo "$svc ($POD): JWT_SECRET_KEY prefix = [$KEY]"
            fi
          done
