name: Hot-reload EC2 (pull latest images + restart)

# Triggers after new ECR images are pushed.
# Sends an SSM command to the running EC2: git pull, docker compose pull, up -d, migrate.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build & Deploy Backend"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 820561684310.dkr.ecr.us-east-1.amazonaws.com
  INSTANCE_ID: i-031445edd3e88f5fe

jobs:
  reload:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy via SSM
        run: |
          echo "Hot-reloading EC2 ${{ env.INSTANCE_ID }} via SSM..."
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /opt/lawbridge",
              "git pull origin main",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 820561684310.dkr.ecr.us-east-1.amazonaws.com",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "sleep 15",
              "for svc in auth-service client-service lawyer-service case-service document-service notification-service payment-service calendar-service monitoring-service search-service ai-assistant-service network-service; do docker compose exec -T $svc python manage.py migrate --noinput 2>&1 | tail -3 || true; done",
              "echo === RELOAD COMPLETE ===",
              "docker compose ps --format table"
            ]' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command ID: $CMD_ID"
          echo "Waiting 3 minutes for reload to complete..."
          sleep 180

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json
