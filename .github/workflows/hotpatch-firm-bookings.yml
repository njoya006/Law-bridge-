name: Hotpatch — fix firm bookings visibility

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Git pull and patch case-service + lawyer-service on EC2
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":[
              "cd /opt/lawbridge && git pull origin main",
              "docker cp /opt/lawbridge/services/case-service/apps/cases/views.py lawbridge-case-service-1:/app/apps/cases/views.py",
              "docker cp /opt/lawbridge/services/lawyer-service/apps/firms/views.py lawbridge-lawyer-service-1:/app/apps/firms/views.py",
              "docker restart lawbridge-case-service-1 lawbridge-lawyer-service-1",
              "sleep 10 && grep -c internal=True /opt/lawbridge/services/case-service/apps/cases/views.py && grep -c user_uuid /opt/lawbridge/services/lawyer-service/apps/firms/views.py && echo BOTH_PATCHED"
            ]}' \
            --query Command.CommandId --output text)

          echo "Command ID: $CMD_ID"
          sleep 25

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text

      - name: Verify firm bookings now appear in incoming-bookings
        run: |
          SCRIPT='
          TOKEN=$(curl -s -X POST http://localhost/api/v1/auth/login/ \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"emmanuel.nji@nji-associates.cm\",\"password\":\"LawBridge@2024\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get(\"access\",\"\"))")
          echo "TOKEN_LENGTH=${#TOKEN}"
          curl -s "http://localhost/api/v1/cases/incoming-bookings/" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(\"COUNT:\",d.get(\"count\"))
          for r in d.get(\"results\",[]):
            meta=r.get(\"booking_metadata\") or {}
            print(\" -\",r.get(\"title\"),\"|\",r.get(\"booking_status\"),\"| target:\",meta.get(\"target_name\"),\"| target_id:\",meta.get(\"target_id\"))
          "
          '
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 20
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
