name: Debug — verify lawyer-service patch and test cross-service call

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check line 244 in lawyer-service container and test internal endpoint
        run: |
          SCRIPT='
          echo "=== lawyer-service views.py lines 240-250 ==="
          docker exec lawbridge-lawyer-service-1 sed -n "240,250p" /app/apps/firms/views.py

          echo "=== Test internal endpoint from case-service container ==="
          docker exec lawbridge-case-service-1 curl -s \
            -H "X-Internal-Api-Key: dev-internal-key" \
            "http://lawyer-service:8003/api/v1/firms/internal/users/240bbc06-751e-467e-b110-ea46d0ea2b60/memberships/"

          echo "=== incoming-bookings result ==="
          TOKEN=$(curl -s -X POST http://localhost/api/v1/auth/login/ \
            -H "Content-Type: application/json" \
            -d '"'"'{"email":"emmanuel.nji@nji-associates.cm","password":"LawBridge@2024"}'"'"' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('"'"'access'"'"','"'"'ERR'"'"'))")
          curl -s "http://localhost/api/v1/cases/incoming-bookings/" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(\"COUNT:\",d.get(\"count\"))
          for r in d.get(\"results\",[]):
            meta=r.get(\"booking_metadata\") or {}
            print(\" -\",r.get(\"title\"),\"|\",r.get(\"booking_status\"),\"| target:\",meta.get(\"target_name\"),\"| target_id:\",meta.get(\"target_id\"))
          "
          '
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-031445edd3e88f5fe \
            --document-name AWS-RunShellScript \
            --parameters commands=["echo $ENCODED | base64 -d | bash"] \
            --query Command.CommandId --output text)
          echo "CMD: $CMD_ID"
          sleep 30
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id i-031445edd3e88f5fe \
            --query '[StandardOutputContent,StandardErrorContent]' \
            --output text
