name: Dump K8s Secrets for Migration

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config

      - name: Dump all DB names and service secrets
        run: |
          echo "=== lawbridge-db-secrets ==="
          kubectl get secret lawbridge-db-secrets -n lawbridge -o json | \
            python3 -c "
          import json,sys,base64
          s=json.load(sys.stdin)
          for k,v in s['data'].items():
              print(f'{k}={base64.b64decode(v).decode()}')
          "

          echo ""
          echo "=== lawbridge-secrets (non-JWT keys) ==="
          kubectl get secret lawbridge-secrets -n lawbridge -o json | \
            python3 -c "
          import json,sys,base64
          s=json.load(sys.stdin)
          for k,v in s['data'].items():
              decoded = base64.b64decode(v).decode()
              print(f'{k}={decoded[:6]}...{decoded[-4:]}')
          "

          echo ""
          echo "=== groq-secret ==="
          kubectl get secret groq-secret -n lawbridge -o json 2>/dev/null | \
            python3 -c "
          import json,sys,base64
          s=json.load(sys.stdin)
          for k,v in s['data'].items():
              decoded = base64.b64decode(v).decode()
              print(f'{k}={decoded[:8]}...{decoded[-4:]}')
          " || echo "groq-secret not found"

          echo ""
          echo "=== All secrets in namespace ==="
          kubectl get secrets -n lawbridge
