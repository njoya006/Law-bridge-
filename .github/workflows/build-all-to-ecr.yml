name: Build ALL services to ECR + redeploy EC2

# One-time run to populate ECR with all service images,
# then hot-reload the running EC2 with the updated docker-compose.yml.

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 820561684310.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO_PREFIX: lawbridge
  INSTANCE_ID: i-031445edd3e88f5fe

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create ECR repositories (idempotent)
        run: |
          for svc in auth-service client-service lawyer-service case-service \
                     document-service notification-service payment-service \
                     calendar-service monitoring-service search-service \
                     network-service; do
            aws ecr describe-repositories --repository-names "lawbridge/${svc}" \
              --region "$AWS_REGION" 2>/dev/null || \
            aws ecr create-repository --repository-name "lawbridge/${svc}" \
              --region "$AWS_REGION"
          done

      - name: Build and push all services
        run: |
          for svc in auth-service client-service lawyer-service case-service \
                     document-service notification-service payment-service \
                     calendar-service monitoring-service search-service \
                     network-service; do
            DIR="services/$svc"
            if [ ! -f "$DIR/Dockerfile" ]; then
              echo "No Dockerfile for $svc — skipping"
              continue
            fi
            IMAGE="${ECR_REGISTRY}/${ECR_REPO_PREFIX}/${svc}"
            echo "==> Building $IMAGE"
            docker buildx build \
              --push \
              --cache-from type=gha,scope=$svc \
              --cache-to   type=gha,mode=max,scope=$svc \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${GITHUB_SHA:0:7}" \
              "$DIR"
            echo "==> Done: $IMAGE"
          done

  redeploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy via SSM Run Command
        run: |
          echo "Sending redeploy command to EC2 ${{ env.INSTANCE_ID }} via SSM..."
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /opt/lawbridge",
              "git pull origin main",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 820561684310.dkr.ecr.us-east-1.amazonaws.com",
              "docker compose pull",
              "docker compose up -d",
              "echo Waiting for postgres...",
              "sleep 10",
              "for svc in auth-service client-service lawyer-service case-service document-service notification-service payment-service calendar-service monitoring-service search-service ai-assistant-service network-service; do docker compose exec -T $svc python manage.py migrate --noinput 2>&1 | tail -2 || true; done",
              "echo REDEPLOY COMPLETE",
              "docker compose ps"
            ]' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command ID: $CMD_ID"
          echo "Waiting 3 minutes for builds to complete on EC2..."
          sleep 180

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --query '{Status:Status,Output:StandardOutputContent}' \
            --output json
