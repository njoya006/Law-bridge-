name: Build & Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'k8s/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'services/' \
            | grep '^services/' \
            | cut -d'/' -f2 \
            | sort -u \
            | paste -sd ',' -)
          echo "services=${CHANGED:-none}" >> "$GITHUB_OUTPUT"
          echo "Changed services: ${CHANGED:-none}"

      - name: Log in to GitHub Container Registry
        if: steps.detect.outputs.services != 'none'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.detect.outputs.services != 'none'
        uses: docker/setup-buildx-action@v3

      - name: Build and push changed services
        if: steps.detect.outputs.services != 'none'
        env:
          SERVICES: ${{ steps.detect.outputs.services }}
          SHA: ${{ github.sha }}
        run: |
          IFS=',' read -ra SVCS <<< "$SERVICES"
          for svc in "${SVCS[@]}"; do
            svc=$(echo "$svc" | xargs)
            [ -z "$svc" ] && continue
            DIR="services/$svc"
            [ ! -f "$DIR/Dockerfile" ] && echo "No Dockerfile for $svc, skipping" && continue
            IMAGE="ghcr.io/njoya006/lawbridge-${svc}"
            echo "==> Building $IMAGE"
            docker buildx build \
              --push \
              --cache-from type=gha,scope=$svc \
              --cache-to   type=gha,mode=max,scope=$svc \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${SHA:0:7}" \
              "$DIR"
          done

      - name: Restart pods in K8s
        if: steps.detect.outputs.services != 'none'
        env:
          SERVICES: ${{ steps.detect.outputs.services }}
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG secret not set — skipping rollout. Add it in Settings → Secrets → Actions."
            exit 0
          fi

          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          IFS=',' read -ra SVCS <<< "$SERVICES"
          for svc in "${SVCS[@]}"; do
            svc=$(echo "$svc" | xargs)
            [ -z "$svc" ] && continue
            echo "Restarting $svc..."
            kubectl rollout restart deployment/"$svc" -n lawbridge 2>/dev/null \
              && kubectl rollout status deployment/"$svc" -n lawbridge --timeout=120s \
              || echo "Deployment $svc not found or rollout failed (continuing)"
          done
