name: Build & Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'k8s/**'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 820561684310.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO_PREFIX: lawbridge

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'services/' \
            | grep '^services/' \
            | cut -d'/' -f2 \
            | sort -u \
            | paste -sd ',' -)
          echo "services=${CHANGED:-none}" >> "$GITHUB_OUTPUT"
          echo "Changed services: ${CHANGED:-none}"

      - name: Configure AWS credentials
        if: steps.detect.outputs.services != 'none'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.detect.outputs.services != 'none'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.detect.outputs.services != 'none'
        uses: docker/setup-buildx-action@v3

      - name: Build and push changed services to ECR
        if: steps.detect.outputs.services != 'none'
        env:
          SERVICES: ${{ steps.detect.outputs.services }}
          SHA: ${{ github.sha }}
        run: |
          IFS=',' read -ra SVCS <<< "$SERVICES"
          for svc in "${SVCS[@]}"; do
            svc=$(echo "$svc" | xargs)
            [ -z "$svc" ] && continue
            DIR="services/$svc"
            [ ! -f "$DIR/Dockerfile" ] && echo "No Dockerfile for $svc, skipping" && continue
            IMAGE="${ECR_REGISTRY}/${ECR_REPO_PREFIX}/${svc}"
            echo "==> Building $IMAGE"
            docker buildx build \
              --push \
              --cache-from type=gha,scope=$svc \
              --cache-to   type=gha,mode=max,scope=$svc \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${SHA:0:7}" \
              "$DIR"
          done

      - name: Apply K8s manifests and restart pods
        env:
          SERVICES: ${{ steps.detect.outputs.services }}
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG secret not set — skipping rollout."
            exit 0
          fi

          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          # Apply non-secret manifests so env var and config changes take effect.
          # Deliberately exclude secrets.yaml — production secrets are managed
          # outside git and must never be overwritten by placeholder values.
          for f in k8s/*.yaml; do
            [[ "$f" == *"secrets.yaml" ]] && continue
            kubectl apply -f "$f" -n lawbridge 2>/dev/null || true
          done

          # Restart only pods whose service code changed
          if [ "$SERVICES" != "none" ]; then
            IFS=',' read -ra SVCS <<< "$SERVICES"
            for svc in "${SVCS[@]}"; do
              svc=$(echo "$svc" | xargs)
              [ -z "$svc" ] && continue
              echo "Restarting $svc..."
              kubectl rollout restart deployment/"$svc" -n lawbridge 2>/dev/null \
                && kubectl rollout status deployment/"$svc" -n lawbridge --timeout=120s \
                || echo "Deployment $svc not found (continuing)"
            done
          fi
