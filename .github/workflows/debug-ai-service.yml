name: Debug — AI Service Status

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check AI service container status and logs
        run: |
          INSTANCE_ID="i-031445edd3e88f5fe"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /opt/lawbridge && echo === CONTAINERS === && docker compose ps && echo === GROQ KEY === && grep GROQ_API_KEY .env | sed s/=.*/=HIDDEN/ && echo === AI IMAGE === && grep AI_SERVICE_IMAGE .env || true && echo === AI LOGS === && docker compose logs ai-assistant-service --tail=50 2>&1 && echo === NGINX TEST === && curl -s -o /dev/null -w HTTP_%{http_code} http://localhost/api/v1/ai/sessions/ -H \"Authorization: Bearer test\""]}' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command: $CMD_ID"
          sleep 25

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json
