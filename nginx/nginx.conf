worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Increase timeouts for long-running SSE streams (AI chat)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # Pass real client IP
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name _;

        # Health probe used by nginx service healthcheck in docker-compose
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── WebSocket (messaging real-time) ──────────────────────────────────
        location /ws/ {
            proxy_pass http://messaging-service:8012;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # ── Messaging ────────────────────────────────────────────────────────
        location /api/v1/messages/ {
            rewrite ^(/api/v1/messages/.*[^/])$ $1/ break;
            proxy_pass http://messaging-service:8012;
        }

        # ── AI (SSE streaming — must disable buffering) ───────────────────────
        location /api/v1/ai/ {
            # .*[^/] handles single-char path segments (e.g. /ai/1) that .+[^/] would miss
            rewrite ^(/api/v1/ai/.*[^/])$ $1/ break;
            proxy_pass         http://ai-assistant-service:8011;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # ── Auth ──────────────────────────────────────────────────────────────
        location /api/v1/auth/ {
            rewrite ^(/api/v1/auth/.*[^/])$ $1/ break;
            proxy_pass http://auth-service:8001;
        }

        # ── Client profiles ───────────────────────────────────────────────────
        location /api/v1/clients/ {
            rewrite ^(/api/v1/clients/.*[^/])$ $1/ break;
            proxy_pass http://client-service:8002;
        }

        # ── Lawyers & firms ───────────────────────────────────────────────────
        location /api/v1/lawyers/ {
            rewrite ^(/api/v1/lawyers/.*[^/])$ $1/ break;
            proxy_pass http://lawyer-service:8003;
        }
        location /api/v1/firms/ {
            rewrite ^(/api/v1/firms/.*[^/])$ $1/ break;
            proxy_pass http://lawyer-service:8003;
        }

        # ── Cases, conflicts, deadlines ───────────────────────────────────────
        location /api/v1/cases/ {
            rewrite ^(/api/v1/cases/.*[^/])$ $1/ break;
            proxy_pass http://case-service:8004;
        }
        location /api/v1/conflicts/ {
            rewrite ^(/api/v1/conflicts/.*[^/])$ $1/ break;
            proxy_pass http://case-service:8004;
        }
        location /api/v1/deadlines/ {
            rewrite ^(/api/v1/deadlines/.*[^/])$ $1/ break;
            proxy_pass http://case-service:8004;
        }

        # ── Documents & audit ─────────────────────────────────────────────────
        location /api/v1/documents/ {
            rewrite ^(/api/v1/documents/.*[^/])$ $1/ break;
            proxy_pass http://document-service:8005;
        }
        location /api/v1/audit/ {
            rewrite ^(/api/v1/audit/.*[^/])$ $1/ break;
            proxy_pass http://document-service:8005;
        }

        # ── Notifications ─────────────────────────────────────────────────────
        location /api/v1/notifications/ {
            rewrite ^(/api/v1/notifications/.*[^/])$ $1/ break;
            proxy_pass http://notification-service:8006;
        }

        # ── Payments & invoices ───────────────────────────────────────────────
        location /api/v1/payments/ {
            rewrite ^(/api/v1/payments/.*[^/])$ $1/ break;
            proxy_pass http://payment-service:8007;
        }
        location /api/v1/invoices/ {
            rewrite ^(/api/v1/invoices/.*[^/])$ $1/ break;
            proxy_pass http://payment-service:8007;
        }

        # ── Calendar ──────────────────────────────────────────────────────────
        location /api/v1/calendar/ {
            rewrite ^(/api/v1/calendar/.*[^/])$ $1/ break;
            proxy_pass http://calendar-service:8008;
        }

        # ── Monitoring / analytics ────────────────────────────────────────────
        location /api/v1/monitoring/ {
            rewrite ^(/api/v1/monitoring/.*[^/])$ $1/ break;
            proxy_pass http://monitoring-service:8009;
        }

        # ── Search ────────────────────────────────────────────────────────────
        location /api/v1/search/ {
            rewrite ^(/api/v1/search/.*[^/])$ $1/ break;
            proxy_pass http://search-service:8010;
        }

        # ── Legal Library ─────────────────────────────────────────────────────
        location /api/v1/library/ {
            rewrite ^(/api/v1/library/.*[^/])$ $1/ break;
            proxy_pass http://library-service:8013;
        }

        # ── Outreach & Partnerships (admin CRM) ───────────────────────────────
        location /api/v1/outreach/ {
            rewrite ^(/api/v1/outreach/.*[^/])$ $1/ break;
            proxy_pass http://outreach-service:8014;
        }

        # ── Catch-all 404 ─────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
