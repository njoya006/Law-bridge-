events {}
http {
    client_max_body_size 50M;

    # CORS for direct browser access (Vercel uses rewrites; this covers Swagger/tools)
    map $http_origin $cors_origin {
        default "";
        "~^https://.*\.vercel\.app$" $http_origin;
    }
    upstream auth_service {
        server auth-service:8001;
    }
    upstream client_service {
        server client-service:8002;
    }
    upstream lawyer_service {
        server lawyer-service:8003;
    }
    upstream case_service {
        server case-service:8004;
    }
    upstream document_service {
        server document-service:8005;
    }
    upstream notification_service {
        server notification-service:8006;
    }
    upstream payment_service {
        server payment-service:8007;
    }
    upstream calendar_service {
        server calendar-service:8008;
    }
    upstream monitoring_service {
        server monitoring-service:8009;
    }
    upstream search_service {
        server search-service:8010;
    }
    upstream ai_service {
        server ai-assistant-service:8011;
    }

    server {
        listen 80;

        # Auth service routes
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Client service routes
        location /api/v1/clients/ {
            proxy_pass http://client_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Lawyer service routes
        location /api/v1/lawyers/ {
            proxy_pass http://lawyer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Firm routes (lawyer-service)
        location /api/v1/firms/ {
            proxy_pass http://lawyer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Case service routes
        location /api/v1/cases/ {
            proxy_pass http://case_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Document service routes
        location /api/v1/documents/ {
            proxy_pass http://document_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Notification service routes
        location /api/v1/notifications/ {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Payment service routes
        location /api/v1/payments/ {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Calendar service routes
        location /api/v1/calendar/ {
            proxy_pass http://calendar_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Monitoring service routes
        location /api/v1/monitoring/ {
            proxy_pass http://monitoring_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Search service routes
        location /api/v1/search/ {
            proxy_pass http://search_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI Assistant service routes
        location /api/v1/ai/ {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
        }

        # Health checks
        location /health/ {
            proxy_pass http://auth_service;
        }

        # Default route
        location / {
            return 200 'LawBridge API Gateway - All services routing configured';
            add_header Content-Type text/plain;
        }
    }
}
